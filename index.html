<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#2c3e50">
    <title>FluffyQuest</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icons/icon-192.png" type="image/png">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <!-- Preload business-critical assets to reduce first-paint latency -->
    <link rel="preload" href="phaser.min.js" as="script">
    <link rel="preload" href="game.js?v=1.0.0" as="script">
    <link rel="preload" href="assets/Screens/Load Screen.jpg" as="image">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self';">
    <script>
        // Polyfill for Performance User Timing API — required by Phaser 3.55 in some
        // browser/WebView environments where performance.now exists but mark/clearMarks do not.
        (function () {
            if (typeof performance !== 'undefined') {
                if (typeof performance.mark !== 'function')         { performance.mark = function () {}; }
                if (typeof performance.clearMarks !== 'function')   { performance.clearMarks = function () {}; }
                if (typeof performance.measure !== 'function')      { performance.measure = function () {}; }
                if (typeof performance.clearMeasures !== 'function'){ performance.clearMeasures = function () {}; }
            }
            if (typeof window !== 'undefined' && typeof window.mgt !== 'object') {
                window.mgt = {};
            }
            if (typeof window !== 'undefined' && window.mgt && typeof window.mgt.clearMarks !== 'function') {
                window.mgt.clearMarks = function () {};
            }
        }());

        // Register service worker for offline caching / Play Store TWA support
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('sw.js').catch(function (err) {
                    console.warn('SW registration failed:', err);
                });
            });
        }
    </script>
    <!-- Phaser served locally — no CDN dependency; works offline in TWA -->
    <script src="phaser.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            background-color: #111;
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none;
            font-family: Arial, sans-serif;
        }
        #score {
            display: none;
        }
        canvas {
            display: block;
            margin: 0 auto;
            touch-action: none;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }
    </style>
</head>
<body>
    <div id="score">Score: 0</div>
    <!-- Static version string — bump to v=1.0.1 etc. on each deployment
         so browsers pick up the new file while still caching between visits. -->
    <script src="game.js?v=1.0.0" defer></script>
</body>
</html>
